  AgentRoleARNParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /bedrock/agent/role/arn
      Type: String
      Value: !GetAtt AgentRole.Arn
      Description: Amazon Bedrock Agents Service Role ARN

Outputs:
  ReactAppExternalURL:
    Value:
      Fn::GetAtt:
        - ReactAppEcsBuildNestedStack
        - Outputs.ExternalUrl
    Description: ALB DNS for the React App
  AgentRole:
    Value:
      Fn::GetAtt: AgentRole.Arn
    Description: Amazon Bedrock Agents Service Role ARN
